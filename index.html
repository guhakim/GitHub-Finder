<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Finder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 상단 헤더 -->
  <header>
    <h1>GitHub Finder</h1>
  </header>

  <main>
    <!-- 제목 + 검색창 -->
    <section class="search-section">
      <h2>Search GitHub Users</h2>
      <p class="subtitle">Enter a username to fetch a user profile and repos</p>
      <div class="search-box">
        <input type="text" id="search-input" placeholder="Search..." />
        <button id="search-btn">&#128269;</button>
      </div>
    </section>

    <!-- 상태 메시지 -->
    <div id="status-message" class="status-message hidden"></div>

    <!-- 프로필 카드 -->
    <section id="profile-card" class="profile-card hidden">

      <!-- 왼쪽: 이미지 + 버튼 -->
      <div class="profile-left">
        <img id="avatar" src="" alt="프로필 이미지" />
        <a id="profile-link" href="" target="_blank" class="view-btn">View Profile</a>
      </div>

      <!-- 오른쪽: 배지 + 정보 -->
      <div class="profile-right">
        <div class="badges">
          <span class="badge blue">Public Repos: <strong id="public-repos"></strong></span>
          <span class="badge gray">Public Gists: <strong id="public-gists"></strong></span>
          <span class="badge green">Followers: <strong id="followers"></strong></span>
          <span class="badge green">Following: <strong id="following"></strong></span>
        </div>

        <ul class="info-list">
          <li><span class="label">Company:</span> <span id="company"></span></li>
          <li><span class="label">Website/Blog:</span> <span id="blog"></span></li>
          <li><span class="label">Location:</span> <span id="location"></span></li>
          <li><span class="label">Member Since:</span> <span id="created-at"></span></li>
        </ul>
      </div>
    </section>

    <!-- 저장소 목록 -->
    <section id="repos-section" class="repos-section hidden">
      <h3>Latest Repos</h3>
      <ul id="repos-list"></ul>
    </section>
  </main>

  <!-- 하단 푸터 -->
  <footer>
    <p>GitHub Finder &#169;</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
